{% extends "base.html" %}

{% block title %}Quiz - PyPy{% endblock %}

{% block content %}
<section class="quiz-section">
    <div class="quiz-header">
        <div class="quiz-breadcrumb">
            <a href="/quizzes">← Back to Quizzes</a>
        </div>
        <h1>Module {{ module_id }} Quiz</h1>
        <p>Test your knowledge and see how well you understand this module</p>
    </div>
    
    <div class="quiz-container" id="quiz-container" data-module-id="{{ module_id }}">
        <div class="loading">
            <p>Loading quiz...</p>
        </div>
    </div>
</section>

<style>
    .quiz-section {
        max-width: 800px;
        margin: 0 auto;
        padding: var(--spacing-xl) var(--spacing-lg);
    }
    
    .quiz-header {
        margin-bottom: var(--spacing-xl);
        text-align: center;
    }
    
    .quiz-breadcrumb {
        margin-bottom: var(--spacing-md);
    }
    
    .quiz-header h1 {
        color: var(--primary-color);
        margin-bottom: 0.5rem;
    }
    
    .quiz-container {
        background: white;
        border-radius: 12px;
        padding: var(--spacing-xl);
        box-shadow: var(--box-shadow);
    }
    
    .quiz-content {
        max-width: 100%;
    }
    
    .quiz-question {
        margin-bottom: var(--spacing-xl);
        padding-bottom: var(--spacing-xl);
        border-bottom: 1px solid #e0e0e0;
    }
    
    .quiz-question:last-of-type {
        border-bottom: none;
        margin-bottom: var(--spacing-lg);
        padding-bottom: var(--spacing-lg);
    }
    
    .quiz-question h4 {
        color: var(--primary-color);
        margin-bottom: 0.5rem;
    }
    
    .question-text {
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: var(--spacing-md);
    }
    
    .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }
    
    .quiz-option {
        display: flex;
        align-items: center;
        padding: 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition);
    }
    
    .quiz-option:hover {
        border-color: var(--primary-color);
        background-color: #f9f9f9;
    }
    
    .quiz-option input[type="radio"] {
        margin-right: 0.75rem;
        cursor: pointer;
        width: 18px;
        height: 18px;
    }
    
    .quiz-option input[type="radio"]:checked + span {
        color: var(--primary-color);
        font-weight: 600;
    }
    
    .quiz-option input[type="radio"]:checked ~ .parent {
        border-color: var(--primary-color);
        background-color: #f0f8ff;
    }
    
    .quiz-actions {
        display: flex;
        gap: var(--spacing-md);
        margin-top: var(--spacing-xl);
        justify-content: center;
    }
    
    .quiz-actions .btn {
        min-width: 200px;
    }
    
    .quiz-results {
        text-align: center;
    }
    
    .results-card {
        background: white;
        padding: var(--spacing-xl);
        border-radius: 12px;
        margin-bottom: var(--spacing-lg);
    }
    
    .results-card h3 {
        margin-bottom: var(--spacing-lg);
        font-size: 1.8rem;
    }
    
    .results-card.passed h3 {
        color: var(--success-color);
    }
    
    .results-card.failed h3 {
        color: var(--danger-color);
    }
    
    .score-display {
        margin-bottom: var(--spacing-lg);
    }
    
    .score-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary-color) 0%, #2c5aa0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto var(--spacing-lg);
        color: white;
    }
    
    .score-percentage {
        font-size: 3rem;
        font-weight: 700;
    }
    
    .score-details {
        font-size: 1.2rem;
        margin-bottom: var(--spacing-md);
    }
    
    .results-message {
        font-size: 1.1rem;
        margin-bottom: var(--spacing-lg);
    }
    
    .loading {
        text-align: center;
        padding: var(--spacing-xl);
        color: #666;
    }
    
    @media (max-width: 768px) {
        .quiz-section {
            padding: var(--spacing-lg);
        }
        
        .quiz-container {
            padding: var(--spacing-lg);
        }
        
        .quiz-actions {
            flex-direction: column;
        }
        
        .quiz-actions .btn {
            width: 100%;
        }
    }
</style>
{% endblock %}
