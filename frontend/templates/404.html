{% extends "base.html" %}

{% block title %}Page Not Found - PyPy{% endblock %}

{% block content %}
<section class="error-section">
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Sorry, the page you're looking for doesn't exist.</p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="/modules" class="btn btn-secondary">View Modules</a>
        </div>
    </div>
</section>

<style>
    .error-section {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 600px;
        padding: var(--spacing-xl) var(--spacing-lg);
    }
    
    .error-container {
        text-align: center;
    }
    
    .error-code {
        font-size: 6rem;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: var(--spacing-md);
    }
    
    .error-section h1 {
        color: var(--primary-color);
        margin-bottom: var(--spacing-md);
    }
    
    .error-section p {
        font-size: 1.2rem;
        color: #666;
        margin-bottom: var(--spacing-lg);
    }
    
    .error-actions {
        display: flex;
        gap: var(--spacing-md);
        justify-content: center;
    }
</style>
{% endblock %}
